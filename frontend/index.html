<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Event Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-50 text-slate-900 dark:bg-[#050505] dark:text-[#f8fafc] min-h-screen antialiased overflow-x-hidden selection:bg-brand-500/30 selection:text-brand-900 dark:selection:bg-[#00f0ff]/30 dark:selection:text-[#00f0ff] transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Load Theme on start
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
  </body>
</html>
