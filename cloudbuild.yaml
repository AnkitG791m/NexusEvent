steps:
  # 1. Install frontend deps
  - name: 'gcr.io/cloud-builders/npm'
    id: 'install-frontend'
    dir: 'frontend'
    args: ['install', '--legacy-peer-deps']

  # 2. Run frontend tests (Vitest)
  - name: 'gcr.io/cloud-builders/npm'
    id: 'test-frontend'
    dir: 'frontend'
    args: ['run', 'test']
    waitFor: ['install-frontend']

  # 3. Build frontend production bundle
  - name: 'gcr.io/cloud-builders/npm'
    id: 'build-frontend'
    dir: 'frontend'
    args: ['run', 'build']
    waitFor: ['test-frontend']

  # 4. Install backend deps (parallel with frontend)
  - name: 'gcr.io/cloud-builders/npm'
    id: 'install-backend'
    dir: 'backend'
    args: ['install']
    waitFor: ['-']

  # 5. Run backend tests (Jest) with coverage
  - name: 'gcr.io/cloud-builders/npm'
    id: 'test-backend'
    dir: 'backend'
    args: ['run', 'test']
    waitFor: ['install-backend']

  # 6. Build + tag frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-frontend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nexus-frontend:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/nexus-frontend:latest', './frontend']
    waitFor: ['build-frontend']

  # 7. Build + tag backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-backend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nexus-backend:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/nexus-backend:latest', './backend']
    waitFor: ['test-backend']

  # 8. Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nexus-frontend'
      - '--image=gcr.io/$PROJECT_ID/nexus-frontend:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--allow-unauthenticated'
    waitFor: ['docker-frontend']

  # 9. Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nexus-backend'
      - '--image=gcr.io/$PROJECT_ID/nexus-backend:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--allow-unauthenticated'
    waitFor: ['docker-backend']

images:
  - 'gcr.io/$PROJECT_ID/nexus-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nexus-frontend:latest'
  - 'gcr.io/$PROJECT_ID/nexus-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nexus-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
